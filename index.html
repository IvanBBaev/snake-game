<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #4ade80;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0f1117;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        transition: color 0.2s ease;
      }
      #hud {
        display: flex;
        gap: 24px;
        font-variant-numeric: tabular-nums;
      }
      #hud span b {
        color: var(--accent);
      }
      canvas {
        background: #161922;
        border: 2px solid #2a2f3a;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      #controls {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: #8a909c;
      }
      #skin {
        background: #161922;
        color: #e6e6e6;
        border: 1px solid #2a2f3a;
        border-radius: 6px;
        padding: 4px 8px;
        font: inherit;
        cursor: pointer;
      }
      #skin:focus {
        outline: 2px solid var(--accent);
      }
      #hint {
        font-size: 0.85rem;
        color: #8a909c;
        margin: 0;
      }
      #support {
        font-size: 0.85rem;
        color: #8a909c;
        margin: 0;
      }
      #support a {
        color: var(--accent);
        text-decoration: none;
      }
      #support a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>Snake</h1>
    <div id="hud">
      <span>Score: <b id="score">0</b></span>
      <span>Best: <b id="best">0</b></span>
    </div>
    <canvas id="game" width="480" height="480"></canvas>
    <div id="controls">
      <label for="skin">Skin</label>
      <select id="skin"></select>
    </div>
    <p id="hint">Arrows / WASD to move &middot; Space or Enter to restart</p>
    <p id="support">
      Enjoying it?
      <a href="https://ko-fi.com/ivanbbaev" target="_blank" rel="noopener noreferrer">&#9749; Support</a>
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
